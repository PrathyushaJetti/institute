<!-- ════ CSS ════ -->
<style>
  /* Logo image */
  .gi-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    min-width: 160px;
    height: 72px;
  }

  .gi-logo img {
    height: 36px;
    width: auto;
    max-width: 130px;
    object-fit: contain;
    filter: grayscale(1) brightness(2);
    opacity: 0.6;
    transition: filter 0.3s ease, opacity 0.3s ease;
    /* fallback: hide broken images gracefully */
    color: transparent;
  }

  .gi-logo img:hover {
    filter: grayscale(0) brightness(1);
    opacity: 1;
  }

  /* Hide broken image icon if Clearbit fails */
  .gi-logo img[src=""],
  .gi-logo img:not([src]) {
    display: none;
  }
</style>
